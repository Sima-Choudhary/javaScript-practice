<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async | events</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <h1>Chai aur code</h1>
    <button id="stop">Stop</button>
</body>
<script>
    /*
    setInterval(function() {  //Executes after every 2000 seconds
        console.log("sima")
    },2000)
    */
    const stopButton = document.getElementById("stop")
    const sayHitesh = function(){
        console.log("Hitesh")
    }

    setTimeout(sayHitesh,2000)  //execute only once

    const changeText = function(){
        document.querySelector('h1').innerHTML = "Hello | Chai"
    }

    const changeMe = setTimeout(changeText,2000) //execute only once

    document.querySelector('#stop').addEventListener('click',function (){
        clearTimeout(changeMe)
        console.log("Stopped")
    })
    
</script>
</html>
